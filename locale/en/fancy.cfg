[mod-setting-description]
krt-mini-train-research-change=If this setting will be set to "To the vanilla train" while "Vanilla train research change" is set to "Don't change" the research will be combined into one. If set to "Don't change" mini trains will still be locked behind vanilla trains no matter what setting "Vanilla train research change" is set to
krt-vanilla-train-research-change=If set to "Don't change" and "Mini Train research change" is set to "To the Vanilla train", the research will be combined into one
krt-vanilla-train-recipe-change=If set to true and "Mini Train research change" to "To after logistics 3" it will add a research reqirement of speed modules to the vanilla train

